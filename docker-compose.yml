name: supabase

configs:
  api-kong-yml:
    content: |
      _format_version: '2.1'
      _transform: true

      ###
      ### Consumers / Users
      ###
      consumers:
        - username: DASHBOARD
        - username: anon
          keyauth_credentials:
            - key: $$SUPABASE_ANON_KEY
        - username: service_role
          keyauth_credentials:
            - key: $$SUPABASE_SERVICE_KEY

      ###
      ### Access Control List
      ###
      acls:
        - consumer: anon
          group: anon
        - consumer: service_role
          group: admin

      ###
      ### Dashboard credentials
      ###
      basicauth_credentials:
        - consumer: DASHBOARD
          username: '$$DASHBOARD_USERNAME'
          password: '$$DASHBOARD_PASSWORD'

      ###
      ### API Routes
      ###
      services:
        ## Open Auth routes
        - name: auth-v1-open
          url: http://auth:9999/verify
          routes:
            - name: auth-v1-open
              strip_path: true
              paths:
                - /auth/v1/verify
          plugins:
            - name: cors
        - name: auth-v1-open-callback
          url: http://auth:9999/callback
          routes:
            - name: auth-v1-open-callback
              strip_path: true
              paths:
                - /auth/v1/callback
          plugins:
            - name: cors
        - name: auth-v1-open-authorize
          url: http://auth:9999/authorize
          routes:
            - name: auth-v1-open-authorize
              strip_path: true
              paths:
                - /auth/v1/authorize
          plugins:
            - name: cors

        ## Secure Auth routes
        - name: auth-v1
          _comment: 'GoTrue: /auth/v1/* -> http://auth:9999/*'
          url: http://auth:9999/
          routes:
            - name: auth-v1-all
              strip_path: true
              paths:
                - /auth/v1/
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon

        ## Secure REST routes
        - name: rest-v1
          _comment: 'PostgREST: /rest/v1/* -> http://rest:3000/*'
          url: http://rest:3000/
          routes:
            - name: rest-v1-all
              strip_path: true
              paths:
                - /rest/v1/
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: true
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon

        ## Secure GraphQL routes
        - name: graphql-v1
          _comment: 'PostgREST: /graphql/v1/* -> http://rest:3000/rpc/graphql'
          url: http://rest:3000/rpc/graphql
          routes:
            - name: graphql-v1-all
              strip_path: true
              paths:
                - /graphql/v1
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: true
            - name: request-transformer
              config:
                add:
                  headers:
                    - Content-Profile:graphql_public
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon

        ## Secure Realtime routes
        - name: realtime-v1-ws
          _comment: 'Realtime: /realtime/v1/* -> ws://realtime:4000/socket/*'
          url: http://realtime-dev.supabase-realtime:4000/socket
          protocol: ws
          routes:
            - name: realtime-v1-ws
              strip_path: true
              paths:
                - /realtime/v1/
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon
        - name: realtime-v1-rest
          _comment: 'Realtime: /realtime/v1/* -> ws://realtime:4000/socket/*'
          url: http://realtime-dev.supabase-realtime:4000/api
          protocol: http
          routes:
            - name: realtime-v1-rest
              strip_path: true
              paths:
                - /realtime/v1/api
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon
        ## Storage routes: the storage server manages its own auth
        - name: storage-v1
          _comment: 'Storage: /storage/v1/* -> http://storage:5000/*'
          url: http://storage:5000/
          routes:
            - name: storage-v1-all
              strip_path: true
              paths:
                - /storage/v1/
          plugins:
            - name: cors

        ## Edge Functions routes
        - name: functions-v1
          _comment: 'Edge Functions: /functions/v1/* -> http://functions:9000/*'
          url: http://functions:9000/
          routes:
            - name: functions-v1-all
              strip_path: true
              paths:
                - /functions/v1/
          plugins:
            - name: cors

        ## Analytics routes
        - name: analytics-v1
          _comment: 'Analytics: /analytics/v1/* -> http://logflare:4000/*'
          url: http://analytics:4000/
          routes:
            - name: analytics-v1-all
              strip_path: true
              paths:
                - /analytics/v1/

        ## Secure Database routes
        - name: meta
          _comment: 'pg-meta: /pg/* -> http://pg-meta:8080/*'
          url: http://meta:8080/
          routes:
            - name: meta-all
              strip_path: true
              paths:
                - /pg/
          plugins:
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin

        ## Block access to /api/mcp
        - name: mcp-blocker
          _comment: 'Block direct access to /api/mcp'
          url: http://studio:3000/api/mcp
          routes:
            - name: mcp-blocker-route
              strip_path: true
              paths:
                - /api/mcp
          plugins:
            - name: request-termination
              config:
                status_code: 403
                message: "Access is forbidden."

        ## MCP endpoint - local access
        - name: mcp
          _comment: 'MCP: /mcp -> http://studio:3000/api/mcp (local access)'
          url: http://studio:3000/api/mcp
          routes:
            - name: mcp
              strip_path: true
              paths:
                - /mcp
          plugins:
            # Block access to /mcp by default
            - name: request-termination
              config:
                status_code: 403
                message: "Access is forbidden."
            # Enable local access (danger zone!)
            # 1. Comment out the 'request-termination' section above
            # 2. Uncomment the entire section below, including 'deny'
            # 3. Add your local IPs to the 'allow' list
            #- name: cors
            #- name: ip-restriction
            #  config:
            #    allow:
            #      - 127.0.0.1
            #      - ::1
            #    deny: []

        ## Protected Dashboard - catch all remaining routes
        - name: dashboard
          _comment: 'Studio: /* -> http://studio:3000/*'
          url: http://studio:3000/
          routes:
            - name: dashboard-all
              strip_path: true
              paths:
                - /
          plugins:
            - name: cors
            - name: basic-auth
              config:
                hide_credentials: true
  db-supabase-sql:
    content: |
      \set pguser `echo "$$POSTGRES_USER"`
      CREATE DATABASE _supabase WITH OWNER :pguser;
  db-supabase-jwt-sql:
    content: |
      \set jwt_secret `echo "$$JWT_SECRET"`
      \set jwt_exp `echo "$$JWT_EXP"`
      ALTER DATABASE postgres SET "app.settings.jwt_secret" TO :'jwt_secret';
      ALTER DATABASE postgres SET "app.settings.jwt_exp" TO :'jwt_exp';
  db-supabase-logs-sql:
    content: |
      \set pguser `echo "$$POSTGRES_USER"`
      \c _supabase
      create schema if not exists _analytics;
      alter schema _analytics owner to :pguser;
      \c postgres
  db-supabase-pooler-sql:
    content: |
      \set pguser `echo "$$POSTGRES_USER"`
      \c _supabase
      create schema if not exists _supavisor;
      alter schema _supavisor owner to :pguser;
      \c postgres
  db-supabase-realtime-sql:
    content: |
      \set pguser `echo "$$POSTGRES_USER"`
      create schema if not exists _realtime;
      alter schema _realtime owner to :pguser;
  db-supabase-roles-sql:
    content: |
      \set pgpass `echo "$$POSTGRES_PASSWORD"`
      ALTER USER authenticator WITH PASSWORD :'pgpass';
      ALTER USER pgbouncer WITH PASSWORD :'pgpass';
      ALTER USER supabase_auth_admin WITH PASSWORD :'pgpass';
      ALTER USER supabase_functions_admin WITH PASSWORD :'pgpass';
      ALTER USER supabase_storage_admin WITH PASSWORD :'pgpass';
  db-supabase-webhooks-sql:
    content: |
      BEGIN;
        -- Create pg_net extension
        CREATE EXTENSION IF NOT EXISTS pg_net SCHEMA extensions;
        -- Create supabase_functions schema
        CREATE SCHEMA supabase_functions AUTHORIZATION supabase_admin;
        GRANT USAGE ON SCHEMA supabase_functions TO postgres, anon, authenticated, service_role;
        ALTER DEFAULT PRIVILEGES IN SCHEMA supabase_functions GRANT ALL ON TABLES TO postgres, anon, authenticated, service_role;
        ALTER DEFAULT PRIVILEGES IN SCHEMA supabase_functions GRANT ALL ON FUNCTIONS TO postgres, anon, authenticated, service_role;
        ALTER DEFAULT PRIVILEGES IN SCHEMA supabase_functions GRANT ALL ON SEQUENCES TO postgres, anon, authenticated, service_role;
        -- supabase_functions.migrations definition
        CREATE TABLE supabase_functions.migrations (
          version text PRIMARY KEY,
          inserted_at timestamptz NOT NULL DEFAULT NOW()
        );
        -- Initial supabase_functions migration
        INSERT INTO supabase_functions.migrations (version) VALUES ('initial');
        -- supabase_functions.hooks definition
        CREATE TABLE supabase_functions.hooks (
          id bigserial PRIMARY KEY,
          hook_table_id integer NOT NULL,
          hook_name text NOT NULL,
          created_at timestamptz NOT NULL DEFAULT NOW(),
          request_id bigint
        );
        CREATE INDEX supabase_functions_hooks_request_id_idx ON supabase_functions.hooks USING btree (request_id);
        CREATE INDEX supabase_functions_hooks_h_table_id_h_name_idx ON supabase_functions.hooks USING btree (hook_table_id, hook_name);
        COMMENT ON TABLE supabase_functions.hooks IS 'Supabase Functions Hooks: Audit trail for triggered hooks.';
        CREATE FUNCTION supabase_functions.http_request()
          RETURNS trigger
          LANGUAGE plpgsql
          AS $$function$$
          DECLARE
            request_id bigint;
            payload jsonb;
            url text := TG_ARGV[0]::text;
            method text := TG_ARGV[1]::text;
            headers jsonb DEFAULT '{}'::jsonb;
            params jsonb DEFAULT '{}'::jsonb;
            timeout_ms integer DEFAULT 1000;
          BEGIN
            IF url IS NULL OR url = 'null' THEN
              RAISE EXCEPTION 'url argument is missing';
            END IF;

            IF method IS NULL OR method = 'null' THEN
              RAISE EXCEPTION 'method argument is missing';
            END IF;

            IF TG_ARGV[2] IS NULL OR TG_ARGV[2] = 'null' THEN
              headers = '{"Content-Type": "application/json"}'::jsonb;
            ELSE
              headers = TG_ARGV[2]::jsonb;
            END IF;

            IF TG_ARGV[3] IS NULL OR TG_ARGV[3] = 'null' THEN
              params = '{}'::jsonb;
            ELSE
              params = TG_ARGV[3]::jsonb;
            END IF;

            IF TG_ARGV[4] IS NULL OR TG_ARGV[4] = 'null' THEN
              timeout_ms = 1000;
            ELSE
              timeout_ms = TG_ARGV[4]::integer;
            END IF;

            CASE
              WHEN method = 'GET' THEN
                SELECT http_get INTO request_id FROM net.http_get(
                  url,
                  params,
                  headers,
                  timeout_ms
                );
              WHEN method = 'POST' THEN
                payload = jsonb_build_object(
                  'old_record', OLD,
                  'record', NEW,
                  'type', TG_OP,
                  'table', TG_TABLE_NAME,
                  'schema', TG_TABLE_SCHEMA
                );

                SELECT http_post INTO request_id FROM net.http_post(
                  url,
                  payload,
                  params,
                  headers,
                  timeout_ms
                );
              ELSE
                RAISE EXCEPTION 'method argument % is invalid', method;
            END CASE;

            INSERT INTO supabase_functions.hooks
              (hook_table_id, hook_name, request_id)
            VALUES
              (TG_RELID, TG_NAME, request_id);

            RETURN NEW;
          END
        $$function$$;
        -- Supabase super admin
        DO
        $$$$
        BEGIN
          IF NOT EXISTS (
            SELECT 1
            FROM pg_roles
            WHERE rolname = 'supabase_functions_admin'
          )
          THEN
            CREATE USER supabase_functions_admin NOINHERIT CREATEROLE LOGIN NOREPLICATION;
          END IF;
        END
        $$$$;
        GRANT ALL PRIVILEGES ON SCHEMA supabase_functions TO supabase_functions_admin;
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA supabase_functions TO supabase_functions_admin;
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA supabase_functions TO supabase_functions_admin;
        ALTER USER supabase_functions_admin SET search_path = "supabase_functions";
        ALTER table "supabase_functions".migrations OWNER TO supabase_functions_admin;
        ALTER table "supabase_functions".hooks OWNER TO supabase_functions_admin;
        ALTER function "supabase_functions".http_request() OWNER TO supabase_functions_admin;
        GRANT supabase_functions_admin TO postgres;
        -- Remove unused supabase_pg_net_admin role
        DO
        $$$$
        BEGIN
          IF EXISTS (
            SELECT 1
            FROM pg_roles
            WHERE rolname = 'supabase_pg_net_admin'
          )
          THEN
            REASSIGN OWNED BY supabase_pg_net_admin TO supabase_admin;
            DROP OWNED BY supabase_pg_net_admin;
            DROP ROLE supabase_pg_net_admin;
          END IF;
        END
        $$$$;
        -- pg_net grants when extension is already enabled
        DO
        $$$$
        BEGIN
          IF EXISTS (
            SELECT 1
            FROM pg_extension
            WHERE extname = 'pg_net'
          )
          THEN
            GRANT USAGE ON SCHEMA net TO supabase_functions_admin, postgres, anon, authenticated, service_role;
            ALTER function net.http_get(url text, params jsonb, headers jsonb, timeout_milliseconds integer) SECURITY DEFINER;
            ALTER function net.http_post(url text, body jsonb, params jsonb, headers jsonb, timeout_milliseconds integer) SECURITY DEFINER;
            ALTER function net.http_get(url text, params jsonb, headers jsonb, timeout_milliseconds integer) SET search_path = net;
            ALTER function net.http_post(url text, body jsonb, params jsonb, headers jsonb, timeout_milliseconds integer) SET search_path = net;
            REVOKE ALL ON FUNCTION net.http_get(url text, params jsonb, headers jsonb, timeout_milliseconds integer) FROM PUBLIC;
            REVOKE ALL ON FUNCTION net.http_post(url text, body jsonb, params jsonb, headers jsonb, timeout_milliseconds integer) FROM PUBLIC;
            GRANT EXECUTE ON FUNCTION net.http_get(url text, params jsonb, headers jsonb, timeout_milliseconds integer) TO supabase_functions_admin, postgres, anon, authenticated, service_role;
            GRANT EXECUTE ON FUNCTION net.http_post(url text, body jsonb, params jsonb, headers jsonb, timeout_milliseconds integer) TO supabase_functions_admin, postgres, anon, authenticated, service_role;
          END IF;
        END
        $$$$;
        -- Event trigger for pg_net
        CREATE OR REPLACE FUNCTION extensions.grant_pg_net_access()
        RETURNS event_trigger
        LANGUAGE plpgsql
        AS $$$$
        BEGIN
          IF EXISTS (
            SELECT 1
            FROM pg_event_trigger_ddl_commands() AS ev
            JOIN pg_extension AS ext
            ON ev.objid = ext.oid
            WHERE ext.extname = 'pg_net'
          )
          THEN
            GRANT USAGE ON SCHEMA net TO supabase_functions_admin, postgres, anon, authenticated, service_role;
            ALTER function net.http_get(url text, params jsonb, headers jsonb, timeout_milliseconds integer) SECURITY DEFINER;
            ALTER function net.http_post(url text, body jsonb, params jsonb, headers jsonb, timeout_milliseconds integer) SECURITY DEFINER;
            ALTER function net.http_get(url text, params jsonb, headers jsonb, timeout_milliseconds integer) SET search_path = net;
            ALTER function net.http_post(url text, body jsonb, params jsonb, headers jsonb, timeout_milliseconds integer) SET search_path = net;
            REVOKE ALL ON FUNCTION net.http_get(url text, params jsonb, headers jsonb, timeout_milliseconds integer) FROM PUBLIC;
            REVOKE ALL ON FUNCTION net.http_post(url text, body jsonb, params jsonb, headers jsonb, timeout_milliseconds integer) FROM PUBLIC;
            GRANT EXECUTE ON FUNCTION net.http_get(url text, params jsonb, headers jsonb, timeout_milliseconds integer) TO supabase_functions_admin, postgres, anon, authenticated, service_role;
            GRANT EXECUTE ON FUNCTION net.http_post(url text, body jsonb, params jsonb, headers jsonb, timeout_milliseconds integer) TO supabase_functions_admin, postgres, anon, authenticated, service_role;
          END IF;
        END;
        $$$$;
        COMMENT ON FUNCTION extensions.grant_pg_net_access IS 'Grants access to pg_net';
        DO
        $$$$
        BEGIN
          IF NOT EXISTS (
            SELECT 1
            FROM pg_event_trigger
            WHERE evtname = 'issue_pg_net_access'
          ) THEN
            CREATE EVENT TRIGGER issue_pg_net_access ON ddl_command_end WHEN TAG IN ('CREATE EXTENSION')
            EXECUTE PROCEDURE extensions.grant_pg_net_access();
          END IF;
        END
        $$$$;
        INSERT INTO supabase_functions.migrations (version) VALUES ('20210809183423_update_grants');
        ALTER function supabase_functions.http_request() SECURITY DEFINER;
        ALTER function supabase_functions.http_request() SET search_path = supabase_functions;
        REVOKE ALL ON FUNCTION supabase_functions.http_request() FROM PUBLIC;
        GRANT EXECUTE ON FUNCTION supabase_functions.http_request() TO postgres, anon, authenticated, service_role;
      COMMIT;
  logs-vector-yml:
    content: |
      api:
        enabled: true
        address: 0.0.0.0:9001

      sources:
        docker_host:
          type: docker_logs
          exclude_containers:
            - supabase-vector

      transforms:
        project_logs:
          type: remap
          inputs:
            - docker_host
          source: |-
            .project = "default"
            .event_message = del(.message)
            .appname = del(.container_name)
            del(.container_created_at)
            del(.container_id)
            del(.source_type)
            del(.stream)
            del(.label)
            del(.image)
            del(.host)
            del(.stream)
        router:
          type: route
          inputs:
            - project_logs
          route:
            kong: '.appname == "supabase-kong"'
            auth: '.appname == "supabase-auth"'
            rest: '.appname == "supabase-rest"'
            realtime: '.appname == "realtime-dev.supabase-realtime"'
            storage: '.appname == "supabase-storage"'
            functions: '.appname == "supabase-edge-functions"'
            db: '.appname == "supabase-db"'
        # Ignores non nginx errors since they are related with kong booting up
        kong_logs:
          type: remap
          inputs:
            - router.kong
          source: |-
            req, err = parse_nginx_log(.event_message, "combined")
            if err == null {
                .timestamp = req.timestamp
                .metadata.request.headers.referer = req.referer
                .metadata.request.headers.user_agent = req.agent
                .metadata.request.headers.cf_connecting_ip = req.client
                .metadata.request.method = req.method
                .metadata.request.path = req.path
                .metadata.request.protocol = req.protocol
                .metadata.response.status_code = req.status
            }
            if err != null {
              abort
            }
        # Ignores non nginx errors since they are related with kong booting up
        kong_err:
          type: remap
          inputs:
            - router.kong
          source: |-
            .metadata.request.method = "GET"
            .metadata.response.status_code = 200
            parsed, err = parse_nginx_log(.event_message, "error")
            if err == null {
                .timestamp = parsed.timestamp
                .severity = parsed.severity
                .metadata.request.host = parsed.host
                .metadata.request.headers.cf_connecting_ip = parsed.client
                url, err = split(parsed.request, " ")
                if err == null {
                    .metadata.request.method = url[0]
                    .metadata.request.path = url[1]
                    .metadata.request.protocol = url[2]
                }
            }
            if err != null {
              abort
            }
        # Gotrue logs are structured json strings which frontend parses directly. But we keep metadata for consistency.
        auth_logs:
          type: remap
          inputs:
            - router.auth
          source: |-
            parsed, err = parse_json(.event_message)
            if err == null {
                .metadata.timestamp = parsed.time
                .metadata = merge!(.metadata, parsed)
            }
        # PostgREST logs are structured so we separate timestamp from message using regex
        rest_logs:
          type: remap
          inputs:
            - router.rest
          source: |-
            parsed, err = parse_regex(.event_message, r'^(?P<time>.*): (?P<msg>.*)$$')
            if err == null {
                .event_message = parsed.msg
                .timestamp = to_timestamp!(parsed.time)
                .metadata.host = .project
            }
        # Filter out healthcheck logs from Realtime
        realtime_logs_filtered:
          type: filter
          inputs:
            - router.realtime
          condition: '!contains(string!(.event_message), "/health")'
        # Realtime logs are structured so we parse the severity level using regex (ignore time because it has no date)
        realtime_logs:
          type: remap
          inputs:
            - realtime_logs_filtered
          source: |-
            .metadata.project = del(.project)
            .metadata.external_id = .metadata.project
            parsed, err = parse_regex(.event_message, r'^(?P<time>\d+:\d+:\d+\.\d+) \[(?P<level>\w+)\] (?P<msg>.*)$$')
            if err == null {
                .event_message = parsed.msg
                .metadata.level = parsed.level
            }
        # Function logs are unstructured messages on stderr
        functions_logs:
          type: remap
          inputs:
            - router.functions
          source: |-
            .metadata.project_ref = del(.project)
        # Storage logs may contain json objects so we parse them for completeness
        storage_logs:
          type: remap
          inputs:
            - router.storage
          source: |-
            .metadata.project = del(.project)
            .metadata.tenantId = .metadata.project
            parsed, err = parse_json(.event_message)
            if err == null {
                .event_message = parsed.msg
                .metadata.level = parsed.level
                .metadata.timestamp = parsed.time
                .metadata.context[0].host = parsed.hostname
                .metadata.context[0].pid = parsed.pid
            }
        # Postgres logs some messages to stderr which we map to warning severity level
        db_logs:
          type: remap
          inputs:
            - router.db
          source: |-
            .metadata.host = "db-default"
            .metadata.parsed.timestamp = .timestamp

            parsed, err = parse_regex(.event_message, r'.*(?P<level>INFO|NOTICE|WARNING|ERROR|LOG|FATAL|PANIC?):.*', numeric_groups: true)

            if err != null || parsed == null {
              .metadata.parsed.error_severity = "info"
            }
            if parsed.level != null {
            .metadata.parsed.error_severity = parsed.level
            }
            if .metadata.parsed.error_severity == "info" {
                .metadata.parsed.error_severity = "log"
            }
            .metadata.parsed.error_severity = upcase!(.metadata.parsed.error_severity)

      sinks:
        logflare_auth:
          type: 'http'
          inputs:
            - auth_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 10
            headers:
              x-api-key: $${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
          uri: 'http://analytics:4000/api/logs?source_name=gotrue.logs.prod'
        logflare_realtime:
          type: 'http'
          inputs:
            - realtime_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 10
            headers:
              x-api-key: $${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
          uri: 'http://analytics:4000/api/logs?source_name=realtime.logs.prod'
        logflare_rest:
          type: 'http'
          inputs:
            - rest_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 10
            headers:
              x-api-key: $${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
          uri: 'http://analytics:4000/api/logs?source_name=postgREST.logs.prod'
        logflare_db:
          type: 'http'
          inputs:
            - db_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 10
            headers:
              x-api-key: $${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
          # We must route the sink through kong because ingesting logs before logflare is fully initialised will
          # lead to broken queries from studio. This works by the assumption that containers are started in the
          # following order: vector > db > logflare > kong
          uri: 'http://kong:8000/analytics/v1/api/logs?source_name=postgres.logs'
        logflare_functions:
          type: 'http'
          inputs:
            - functions_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 10
            headers:
              x-api-key: $${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
          uri: 'http://analytics:4000/api/logs?source_name=deno-relay-logs'
        logflare_storage:
          type: 'http'
          inputs:
            - storage_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 10
            headers:
              x-api-key: $${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
          uri: 'http://analytics:4000/api/logs?source_name=storage.logs.prod.2'
        logflare_kong:
          type: 'http'
          inputs:
            - kong_logs
            - kong_err
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 10
            headers:
              x-api-key: $${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
          uri: 'http://analytics:4000/api/logs?source_name=cloudflare.logs.prod'
  pooler-pooler-exs:
    content: |
      {:ok, _} = Application.ensure_all_started(:supavisor)

      {:ok, version} =
        case Supavisor.Repo.query!("select version()") do
          %{rows: [[ver]]} -> Supavisor.Helpers.parse_pg_version(ver)
          _ -> nil
        end

      params = %{
        "external_id" => System.get_env("POOLER_TENANT_ID"),
        "db_host" => "db",
        "db_port" => System.get_env("POSTGRES_PORT"),
        "db_database" => System.get_env("POSTGRES_DB"),
        "require_user" => false,
        "auth_query" => "SELECT * FROM pgbouncer.get_auth($$1)",
        "default_max_clients" => System.get_env("POOLER_MAX_CLIENT_CONN"),
        "default_pool_size" => System.get_env("POOLER_DEFAULT_POOL_SIZE"),
        "default_parameter_status" => %{"server_version" => version},
        "users" => [%{
          "db_user" => "pgbouncer",
          "db_password" => System.get_env("POSTGRES_PASSWORD"),
          "mode_type" => System.get_env("POOLER_POOL_MODE"),
          "pool_size" => System.get_env("POOLER_DEFAULT_POOL_SIZE"),
          "is_manager" => true
        }]
      }

      if !Supavisor.Tenants.get_tenant_by_external_id(params["external_id"]) do
        {:ok, _} = Supavisor.Tenants.create_tenant(params)
      end

services:
  studio:
    container_name: supabase-studio
    image: supabase/studio:2025.12.17-sha-43f4f7f
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://studio:3000/api/platform/profile').then((r) => {if (r.status !== 200) throw new Error(r.status)})"
        ]
      timeout: 10s
      interval: 5s
      retries: 3
    depends_on:
      analytics:
        condition: service_healthy
    environment:
      # Binds nestjs listener to both IPv4 and IPv6 network interfaces
      HOSTNAME: "::"

      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}

      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}

      # LOGFLARE_API_KEY is deprecated
      LOGFLARE_API_KEY: ${LOGFLARE_PUBLIC_ACCESS_TOKEN}
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${LOGFLARE_PUBLIC_ACCESS_TOKEN}
      LOGFLARE_PRIVATE_ACCESS_TOKEN: ${LOGFLARE_PRIVATE_ACCESS_TOKEN}

      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: true
      # Comment to use Big Query backend for analytics
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      # Uncomment to use Big Query backend for analytics
      # NEXT_ANALYTICS_BACKEND_PROVIDER: bigquery
  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - ${KONG_HTTP_PORT}:8000/tcp
      - ${KONG_HTTPS_PORT}:8443/tcp
    configs:
      - source: api-kong-yml
        target: /home/kong/temp.yml
        mode: 0555
    depends_on:
      analytics:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      # https://github.com/supabase/cli/issues/14
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination,ip-restriction
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    # https://unix.stackexchange.com/a/294837
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'
  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.184.0
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9999/health"
        ]
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      db:
        # Disable this if you are using an external Postgres database
        condition: service_healthy
      analytics:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}

      # Uncomment to bypass nonce check in ID Token flow. Commonly set to true when using Google Sign In on mobile.
      # GOTRUE_EXTERNAL_SKIP_NONCE_CHECK: true

      # GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: true
      # GOTRUE_SMTP_MAX_FREQUENCY: 1s
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE}

      GOTRUE_EXTERNAL_PHONE_ENABLED: ${ENABLE_PHONE_SIGNUP}
      GOTRUE_SMS_AUTOCONFIRM: ${ENABLE_PHONE_AUTOCONFIRM}
  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v14.1
    restart: unless-stopped
    depends_on:
      db:
        # Disable this if you are using an external Postgres database
        condition: service_healthy
      analytics:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    command:
      [
        "postgrest"
      ]
  realtime:
    # This container name looks inconsistent but is correct because realtime constructs tenant id by parsing the subdomain
    container_name: realtime-dev.supabase-realtime
    image: supabase/realtime:v2.68.0
    restart: unless-stopped
    depends_on:
      db:
        # Disable this if you are using an external Postgres database
        condition: service_healthy
      analytics:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sSfL --head -o /dev/null -H \"Authorization: Bearer ${ANON_KEY}\" http://localhost:4000/api/tenants/realtime-dev/health"
        ]
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 10s
    environment:
      PORT: 4000
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
  # To use S3 backed storage: docker compose -f docker-compose.yml -f docker-compose.s3.yml up
  storage:
    container_name: supabase-storage
    image: supabase/storage-api:v1.33.0
    restart: unless-stopped
    volumes:
      - ./var/storage:/var/lib/storage:z
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://storage:5000/status"
        ]
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      db:
        # Disable this if you are using an external Postgres database
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      # TODO: https://github.com/supabase/storage-api/issues/55
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
  imgproxy:
    container_name: supabase-imgproxy
    image: darthsim/imgproxy:v3.30.1
    restart: unless-stopped
    volumes:
      - ./var/storage:/var/lib/storage:z
    healthcheck:
      test:
        [
          "CMD",
          "imgproxy",
          "health"
        ]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION}
      IMGPROXY_MAX_SRC_RESOLUTION: 16.8
  meta:
    container_name: supabase-meta
    image: supabase/postgres-meta:v0.95.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      analytics:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
  analytics:
    container_name: supabase-analytics
    image: supabase/logflare:1.27.0
    restart: unless-stopped
    ports:
      - 4000:4000
    # Uncomment to use Big Query backend for analytics
    # volumes:
    #   - type: bind
    #     source: ${PWD}/gcloud.json
    #     target: /opt/app/rel/logflare/bin/gcloud.json
    #     read_only: true
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "http://localhost:4000/health"
        ]
      timeout: 5s
      interval: 5s
      retries: 10
    depends_on:
      db:
        # Disable this if you are using an external Postgres database
        condition: service_healthy
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: _supabase
      DB_HOSTNAME: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${LOGFLARE_PUBLIC_ACCESS_TOKEN}
      LOGFLARE_PRIVATE_ACCESS_TOKEN: ${LOGFLARE_PRIVATE_ACCESS_TOKEN}
      LOGFLARE_SINGLE_TENANT: true
      LOGFLARE_SUPABASE_MODE: true
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/_supabase
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true
  db:
    user: root
    container_name: supabase-db
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    configs:
      - source: db-supabase-realtime-sql
        target: /docker-entrypoint-initdb.d/migrations/99-realtime.sql
        mode: 0555
      # Must be superuser to create event trigger
      - source: db-supabase-webhooks-sql
        target: /docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql
        mode: 0555
      # Must be superuser to alter reserved role
      - source: db-supabase-roles-sql
        target: /docker-entrypoint-initdb.d/init-scripts/99-roles.sql
        mode: 0555
      # Initialize the database settings with JWT_SECRET and JWT_EXP
      - source: db-supabase-jwt-sql
        target: /docker-entrypoint-initdb.d/init-scripts/99-jwt.sql
        mode: 0555
      # Changes required for internal supabase data such as _analytics
      - source: db-supabase-sql
        target: /docker-entrypoint-initdb.d/migrations/97-_supabase.sql
        mode: 0555
      # Changes required for Analytics support
      - source: db-supabase-logs-sql
        target: /docker-entrypoint-initdb.d/migrations/99-logs.sql
        mode: 0555
      # Changes required for Pooler support
      - source: db-supabase-pooler-sql
        target: /docker-entrypoint-initdb.d/migrations/99-pooler.sql
        mode: 0555
    volumes:
      # PGDATA directory is persisted between restarts
      - ./var/db/data:/var/lib/postgresql/data:Z
      - ./var/db/key:/postgresqlkey:Z
    healthcheck:
      test:
        [
        "CMD",
        "pg_isready",
        "-U",
        "postgres",
        "-h",
        "localhost"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      vector:
        condition: service_healthy
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    command: >
      sh -c '
        set -e

        DATA_KEY="/postgresqlkey/pgsodium_root.key"
        TARGET_KEY="/etc/postgresql-custom/pgsodium_root.key"

        # Generate key if missing
        if [ ! -f "$$DATA_KEY" ]; then
          echo "Generating pgsodium root key..."
          openssl rand -hex 32 > "$$DATA_KEY"
          chmod 600 "$$DATA_KEY"
          chown postgres:postgres "$$DATA_KEY"
        fi

        # Copy into expected location (overwrite each start to be safe)
        cp "$$DATA_KEY" "$$TARGET_KEY"
        chown postgres:postgres "$$TARGET_KEY"
        chmod 600 "$$TARGET_KEY"

        echo "pgsodium key ready."

        exec docker-entrypoint.sh postgres -c config_file=/etc/postgresql/postgresql.conf -c log_min_messages=fatal
      '
  vector:
    container_name: supabase-vector
    image: timberio/vector:0.28.1-alpine
    restart: unless-stopped
    configs:
      - source: logs-vector-yml
        target: /etc/vector/vector.yml
        mode: 0555
    volumes:
      - ${DOCKER_SOCKET_LOCATION}:/var/run/docker.sock:ro,z
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://vector:9001/health"
        ]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${LOGFLARE_PUBLIC_ACCESS_TOKEN}
    command:
      [
        "--config",
        "/etc/vector/vector.yml"
      ]
    security_opt:
      - "label=disable"
  # Update the DATABASE_URL if you are using an external Postgres database
  supavisor:
    container_name: supabase-pooler
    image: supabase/supavisor:2.7.4
    restart: unless-stopped
    ports:
      - ${POSTGRES_PORT}:5432
      - ${POOLER_PROXY_PORT_TRANSACTION}:6543
    configs:
      - source: pooler-pooler-exs
        target: /etc/pooler/pooler.exs
        mode: 0555
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sSfL",
          "--head",
          "-o",
          "/dev/null",
          "http://127.0.0.1:4000/api/health"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      analytics:
        condition: service_healthy
    environment:
      PORT: 4000
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ecto://supabase_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/_supabase
      CLUSTER_POSTGRES: true
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      REGION: local
      ERL_AFLAGS: -proto_dist inet_tcp
      POOLER_TENANT_ID: ${POOLER_TENANT_ID}
      POOLER_DEFAULT_POOL_SIZE: ${POOLER_DEFAULT_POOL_SIZE}
      POOLER_MAX_CLIENT_CONN: ${POOLER_MAX_CLIENT_CONN}
      POOLER_POOL_MODE: transaction
      DB_POOL_SIZE: ${POOLER_DB_POOL_SIZE}
    command:
      [
        "/bin/sh",
        "-c",
        "/app/bin/migrate && /app/bin/supavisor eval \"$$(cat /etc/pooler/pooler.exs)\" && /app/bin/server"
      ]